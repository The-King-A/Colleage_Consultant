<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI志愿填报顾问</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://fastly.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* 输入框自适应高度 */
        textarea {
            min-height: 44px;
            max-height: 200px;
            transition: height 0.2s;
        }

        /* 加载动画 */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        /* 打字机效果 */
        .typing-cursor::after {
            content: "|";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* 消息气泡阴影 */
        .message-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* 卡片悬停效果 */
        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* 按钮悬停效果 */
        .btn-hover {
            transition: all 0.2s ease;
        }

        .btn-hover:hover {
            transform: scale(1.05);
        }

        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* 微调动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 20px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
<div id="app" class="flex flex-col h-screen bg-gradient-to-br from-gray-50 to-gray-100">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm py-4 px-6 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg gradient-bg flex items-center justify-center">
                <i class="fas fa-robot text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">AI志愿填报顾问</h1>
                <p class="text-xs text-gray-500">智能升学规划助手</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button
                    @click="startNewConversation"
                    class="ml-2 p-3 rounded-lg bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white btn-hover shadow-md"
                    title="新建对话">
                <i class="fas fa-plus"></i>
            </button>
            <button @click="toggleDarkMode" class="p-3 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 btn-hover">
                <i :class="darkMode ? 'fas fa-moon' : 'fas fa-sun'"></i>
            </button>
        </div>
    </header>

    <!-- 聊天内容区域 -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6" ref="chatContainer" :class="{ 'bg-gray-900': darkMode }">
        <!-- 欢迎信息 -->
        <div v-if="messages.length === 0" class="flex flex-col items-center justify-center h-full text-center py-12">
            <div class="w-24 h-24 rounded-full gradient-bg flex items-center justify-center mb-6 card-hover">
                <i class="fas fa-robot text-white text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">欢迎使用AI志愿填报顾问</h2>
            <p class="text-gray-600 max-w-md mb-8">我是您的智能升学规划助手，可以帮助您分析院校、专业选择和志愿填报策略。</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl w-full">
                <div class="bg-white p-4 rounded-xl shadow-sm card-hover border border-gray-100">
                    <h3 class="font-semibold text-gray-800 mb-2"><i class="fas fa-university text-blue-500 mr-2"></i>院校推荐</h3>
                    <p class="text-gray-600 text-sm">根据分数和兴趣推荐合适院校</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm card-hover border border-gray-100">
                    <h3 class="font-semibold text-gray-800 mb-2"><i class="fas fa-book-open text-green-500 mr-2"></i>专业分析</h3>
                    <p class="text-gray-600 text-sm">热门专业就业前景深度解析</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm card-hover border border-gray-100">
                    <h3 class="font-semibold text-gray-800 mb-2"><i class="fas fa-chart-line text-purple-500 mr-2"></i>录取概率</h3>
                    <p class="text-gray-600 text-sm">基于往年数据预测录取可能性</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm card-hover border border-gray-100">
                    <h3 class="font-semibold text-gray-800 mb-2"><i class="fas fa-file-contract text-yellow-500 mr-2"></i>填报策略</h3>
                    <p class="text-gray-600 text-sm">个性化志愿填报方案制定</p>
                </div>
            </div>
        </div>

        <!-- 聊天消息 -->
        <div v-for="(message, index) in messages" :key="index" class="max-w-4xl mx-auto fade-in-up">
            <div :class="['flex', message.role === 'user' ? 'justify-end' : 'justify-start']">
                <div :class="['flex items-start space-x-3 max-w-full', message.role === 'user' ? 'flex-row-reverse space-x-reverse' : '']">
                    <!-- 头像 -->
                    <div :class="['w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0',
                                    message.role === 'user' ? 'bg-gradient-to-br from-blue-500 to-indigo-500 text-white' : 'bg-gradient-to-br from-green-500 to-teal-500 text-white',
                                    darkMode && message.role === 'assistant' ? 'bg-gray-700 text-green-400' : '']">
                        <i :class="message.role === 'user' ? 'fas fa-user' : 'fas fa-robot'"></i>
                    </div>
                    
                    <!-- 消息内容 -->
                    <div :class="['p-4 rounded-2xl max-w-[85%] md:max-w-[75%] message-shadow',
                                    message.role === 'user'
                                        ? 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-tr-none'
                                        : darkMode
                                            ? 'bg-gray-800 text-gray-100 border border-gray-700 rounded-tl-none'
                                            : 'bg-white rounded-tl-none']">
                        <div v-if="message.role === 'assistant' && message.isLoading" class="flex space-x-2">
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse']"></div>
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-100']"></div>
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-200']"></div>
                        </div>
                        <div v-else class="whitespace-pre-wrap">
                                <span v-for="(char, charIndex) in message.content" :key="charIndex"
                                      :class="{'opacity-0': charIndex >= message.visibleChars, 'fade-in': charIndex < message.visibleChars}">
                                    {{ char }}
                                </span>
                            <span v-if="message.isStreaming" class="typing-cursor"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 输入框区域 -->
    <footer :class="['border-t p-4 md:p-6', darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200']">
        <div class="max-w-4xl mx-auto relative">
            <div class="flex items-end space-x-3">
                <div class="flex-1 relative">
                    <textarea
                            v-model="userInput"
                            @keydown.enter.exact.prevent="sendMessage"
                            @keydown.ctrl.enter.exact.prevent="sendMessage"
                            @keydown.esc.exact="stopResponse"
                            placeholder="请输入您的问题...例如：我想报考计算机专业，有哪些推荐的学校？"
                            :class="['w-full border rounded-2xl py-4 px-5 pr-12 focus:outline-none focus:ring-2 resize-none message-shadow',
                                darkMode
                                    ? 'bg-gray-700 border-gray-600 text-white focus:ring-blue-400 placeholder-gray-400'
                                    : 'border-gray-300 focus:ring-blue-500 focus:border-transparent bg-white']"
                            rows="1"
                            ref="textarea"
                            @input="adjustTextareaHeight"
                    ></textarea>
                    <div class="absolute right-4 bottom-4 text-gray-400 text-sm">
                        <span v-if="userInput.length > 0">{{ userInput.length }}</span>
                    </div>
                </div>
                
                <button
                        @click="isLoading ? stopResponse() : sendMessage()"
                        :disabled="(!userInput.trim() && !isLoading)"
                        :class="['p-4 rounded-2xl flex items-center justify-center message-shadow btn-hover',
                                isLoading
                                    ? 'bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white'
                                    : userInput.trim()
                                        ? 'bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white'
                                        : 'bg-gray-200 text-gray-400 cursor-not-allowed',
                                'disabled:opacity-50 disabled:cursor-not-allowed']"
                        :title="isLoading ? '停止生成' : '发送消息'"
                >
                    <i :class="isLoading ? 'fas fa-stop' : 'fas fa-paper-plane'"></i>
                </button>
            </div>
            
            <!-- 快捷提示 -->
            <div v-if="messages.length === 0" class="mt-4 flex flex-wrap gap-2 justify-center">
                <button @click="quickQuestion('我想报考计算机专业，有哪些推荐的学校？')" 
                        class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full transition-all">
                    计算机专业推荐
                </button>
                <button @click="quickQuestion('根据我的分数580分，能上哪些一本院校？')" 
                        class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full transition-all">
                    580分能上什么学校
                </button>
                <button @click="quickQuestion('师范类专业就业前景怎么样？')" 
                        class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full transition-all">
                    师范类就业前景
                </button>
            </div>
        </div>
    </footer>
</div>

<script>
    const {createApp, ref, nextTick, onMounted, watch} = Vue;

    createApp({
        setup() {
            const messages = ref([]);
            const userInput = ref('');
            const isLoading = ref(false);
            const chatContainer = ref(null);
            const textarea = ref(null);
            const darkMode = ref(false);

            const memoeryId = ref(Date.now().toString());
            let controller = null;
            let typingInterval = null;
            let currentTypingIndex = 0;

            // 调整文本区域高度
            const adjustTextareaHeight = () => {
                const textareaEl = textarea.value;
                textareaEl.style.height = 'auto';
                textareaEl.style.height = `${Math.min(textareaEl.scrollHeight, 200)}px`;
            };

            // 滚动到底部
            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                });
            };

            // 切换暗黑模式
            const toggleDarkMode = () => {
                darkMode.value = !darkMode.value;
                localStorage.setItem('darkMode', darkMode.value);
            };

            // 新建会话
            const startNewConversation = () => {
                // 清空聊天记录
                messages.value = [];
                // 生成新的 memoryId
                memoeryId.value = Date.now().toString();
                // 添加欢迎消息
                addWelcomeMessage();
                // 滚动到底部
                scrollToBottom();
                // 聚焦输入框
                nextTick(() => {
                    textarea.value.focus();
                });
            };

            // 添加欢迎消息
            const addWelcomeMessage = () => {
                messages.value.push({
                    role: 'assistant',
                    content: '您好！我是传智教育AI志愿填报顾问，专注于为您提供个性化的升学规划建议。\\n\\n我可以帮助您：\\n• 分析适合的院校和专业\\n• 预测录取概率\\n• 制定志愿填报策略\\n• 解答各类升学疑问\\n\\n请告诉我您的具体情况，比如分数、感兴趣的专业等，我将为您提供专业的建议！',
                    isLoading: false,
                    visibleChars: 0,
                    isStreaming: false
                });
                // 启动打字效果
                startTypingEffect(messages.value.length - 1);
            };

            // 模拟逐字打印效果
            const startTypingEffect = (messageIndex) => {
                const message = messages.value[messageIndex];
                if (!message || message.visibleChars >= message.content.length) {
                    clearInterval(typingInterval);
                    typingInterval = null;
                    messages.value[messageIndex].isStreaming = false;
                    return;
                }

                messages.value[messageIndex].visibleChars++;
                scrollToBottom();
                
                // 继续打字效果
                setTimeout(() => {
                    startTypingEffect(messageIndex);
                }, 20);
            };

            // 发送消息
            const sendMessage = async () => {
                if (!userInput.value.trim() || isLoading.value) return;

                // 中止之前的请求
                if (controller) {
                    controller.abort();
                }
                controller = new AbortController();

                const userMessage = {
                    role: 'user',
                    content: userInput.value.trim(),
                    isLoading: false,
                    visibleChars: userInput.value.trim().length,
                    isStreaming: false
                };

                messages.value.push(userMessage);

                const assistantMessage = {
                    role: 'assistant',
                    content: '',
                    isLoading: true,
                    visibleChars: 0,
                    isStreaming: true
                };

                messages.value.push(assistantMessage);

                userInput.value = '';
                adjustTextareaHeight();
                scrollToBottom();

                isLoading.value = true;

                try {
                    const response = await fetch(`/chat?message=${encodeURIComponent(userMessage.content)}&memoryId=${memoeryId.value}`, {
                        signal: controller.signal
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let messageIndex = messages.value.length - 1;

                    // 先清除之前的打字效果
                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }

                    // 开始流式处理
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, {stream: true});
                        buffer += chunk;

                        // 直接更新内容
                        messages.value[messageIndex].content = buffer;
                        messages.value[messageIndex].isLoading = false;

                        scrollToBottom();
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('请求被用户中止');
                    } else {
                        console.error('请求出错:', error);
                        const lastMessage = messages.value[messages.value.length - 1];
                        lastMessage.content = '抱歉，请求过程中出现错误: ' + error.message;
                        lastMessage.visibleChars = lastMessage.content.length;
                    }
                } finally {
                    const lastMessage = messages.value[messages.value.length - 1];
                    lastMessage.isLoading = false;
                    lastMessage.isStreaming = false;

                    // 确保所有字符都可见
                    if (lastMessage.visibleChars < lastMessage.content.length) {
                        lastMessage.visibleChars = lastMessage.content.length;
                    }

                    isLoading.value = false;
                    controller = null;

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }

                    scrollToBottom();
                }
            };

            // 停止响应
            const stopResponse = () => {
                if (controller) {
                    controller.abort();
                    const lastMessage = messages.value[messages.value.length - 1];
                    lastMessage.isLoading = false;
                    lastMessage.isStreaming = false;

                    if (lastMessage.visibleChars < lastMessage.content.length) {
                        lastMessage.visibleChars = lastMessage.content.length;
                    }

                    isLoading.value = false;
                    controller = null;

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }
                }
            };

            // 快捷问题
            const quickQuestion = (question) => {
                userInput.value = question;
                nextTick(() => {
                    sendMessage();
                });
            };

            // 初始化
            onMounted(() => {
                // 检查暗黑模式偏好
                darkMode.value = localStorage.getItem('darkMode') === 'true' ||
                    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

                // 添加欢迎消息
                addWelcomeMessage();
                scrollToBottom();

                // 聚焦输入框
                nextTick(() => {
                    textarea.value.focus();
                });
            });

            // 监听消息变化自动滚动
            watch(messages, scrollToBottom, {deep: true});

            return {
                messages,
                userInput,
                isLoading,
                darkMode,
                chatContainer,
                textarea,
                sendMessage,
                stopResponse,
                toggleDarkMode,
                adjustTextareaHeight,
                startNewConversation,
                quickQuestion
            };
        }
    }).mount('#app');
</script>
</body>
</html>
